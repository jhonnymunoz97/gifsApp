<div class="row">
    <div class="col-md-4 col-sm-6 animate__animated animate__fadeIn" *ngFor="let gif of getResultados()">
        <div class="card">
            <img class="card-img-top" [src]="gif.images.downsized_medium.url" [alt]="gif.title" width="300" height="300">
            <div class="card-body">
                <p class="card-text">
                    {{ gif.title }}    
                </p>
            </div>
        </div>
    </div>
</div>
